<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SRG Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .sidebar { transition: all 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.active { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-slate-100">

<div class="flex h-screen overflow-hidden">

    <div id="sidebar" class="sidebar w-72 bg-slate-900 text-white flex flex-col fixed md:relative h-full z-50">
        <div class="p-6 border-b border-slate-700 flex justify-between items-center">
            <h1 class="text-3xl font-bold">SRG <span class="text-blue-400">Admin</span></h1>
            <button onclick="toggleSidebar()" class="md:hidden text-2xl">
                <i class="bi bi-x"></i>
            </button>
        </div>
        
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <a href="#" class="sidebar-link flex items-center gap-3 px-5 py-4 rounded-2xl active">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 px-5 py-4 rounded-2xl">
                <i class="bi bi-people"></i> Users
            </a>
            <a href="worker-admin" class="sidebar-link flex items-center gap-3 px-5 py-4 rounded-2xl">
                <i class="bi bi-person-workspace"></i> Workers
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 px-5 py-4 rounded-2xl">
                <i class="bi bi-calendar-check"></i> Bookings
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 px-5 py-4 rounded-2xl">
                <i class="bi bi-grid"></i> Categories
            </a>
            <a href="#" class="sidebar-link flex items-center gap-3 px-5 py-4 rounded-2xl">
                <i class="bi bi-star"></i> Reviews
            </a>
        </nav>

        <div class="p-4 border-t border-slate-700">
            <form action="/auth/logout" method="get">
                <button type="submit" class="w-full flex items-center justify-center gap-3 bg-red-600 hover:bg-red-700 text-white px-5 py-4 rounded-2xl font-medium transition">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Logout</span>
                </button>
            </form>
        </div>
    </div>

    <div class="flex-1 overflow-auto">
        <header class="bg-white px-6 md:px-8 py-5 flex justify-between items-center shadow-sm sticky top-0 z-40">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-3xl text-slate-700">
                    <i class="bi bi-list"></i>
                </button>
                <h1 class="text-xl md:text-2xl font-semibold text-slate-800">Dashboard Overview</h1>
            </div>
        </header>

        <div class="p-6 md:p-8">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6">
                <div class="stat-card bg-white rounded-3xl p-6 shadow">
                    <p class="text-slate-500 text-sm">Total Users</p>
                    <h2 id="total-users" class="text-4xl md:text-5xl font-bold mt-4">...</h2>
                    <p class="text-emerald-600 text-sm mt-3">↑ Live Count</p>
                </div>
                <div class="stat-card bg-white rounded-3xl p-6 shadow">
                    <p class="text-slate-500 text-sm">Total Workers</p>
                    <h2 id="total-workers" class="text-4xl md:text-5xl font-bold mt-4">...</h2>
                    <p class="text-emerald-600 text-sm mt-3">↑ Live Count</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    // Database se data automatically fetch karne ka function
    async function fetchLiveStats() {
        try {
            const response = await fetch('/api/stats'); // Backend API endpoint
            const data = await response.json();
            
            // HTML numbers ko update karna
            document.getElementById('total-users').innerText = data.totalUsers;
            document.getElementById('total-workers').innerText = data.totalWorkers;
        } catch (error) {
            console.error("Data fetch karne me error aayi:", error);
            document.getElementById('total-users').innerText = "Error";
            document.getElementById('total-workers').innerText = "Error";
        }
    }

    // Page load hote hi function run hoga
    window.addEventListener('DOMContentLoaded', fetchLiveStats);
</script>

</body>
</html>
