<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | 🥈 LabourMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
        }
        .input-focus {
            transition: all 0.3s;
        }
        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(30, 58, 138, 0.15);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full">
    <div class="login-card bg-white rounded-3xl p-10">

        <!-- Header -->
        <div class="text-center mb-10">
            <div class="mx-auto w-20 h-20 bg-blue-600 rounded-3xl flex items-center justify-center mb-6 shadow-lg">
                <i class="fas fa-shield-alt text-4xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">Admin Login</h1>
            <p class="text-slate-500 mt-2">Worker admin login-page</p>
        </div>

        <form action="/auth/login-page" method="post" class="space-y-6">
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-slate-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="admin@srginstitute.com"
                        required
                        class="input-focus w-full pl-11 pr-4 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 text-base">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        class="input-focus w-full pl-11 pr-4 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 text-base">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="remember" class="w-4 h-4 accent-blue-600">
                    <span class="text-slate-600 text-sm">Remember me</span>
                </label>
                <a href="/auth/forgot-password" class="text-blue-600 hover:underline text-sm font-medium">Forgot Password?</a>
            </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 transition py-4 rounded-2xl text-white font-semibold text-lg shadow-md">
                <i class="fas fa-sign-in-alt mr-2"></i>
                Login to Dashboard
            </button>
        </form>

        <div class="text-center mt-8 text-slate-400 text-sm">
            © 2026 worker 🥈 LabourMitra | Ghaziabad
        </div>
    </div>
</div>

<!-- Logout Success Toast -->
{% if msg == "logout_success" %}
<div id="toast" 
     class="fixed top-6 right-6 bg-green-600 text-white px-6 py-4 rounded-2xl shadow-xl flex items-center gap-3 z-50">
    <i class="fas fa-check-circle"></i>
    <span>Logout Successfully</span>
</div>

<script>
    setTimeout(() => {
        const toast = document.getElementById("toast");
        if (toast) toast.style.opacity = "0";
    }, 2500);
</script>
{% endif %}

</body>
</html>
