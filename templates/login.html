<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | SRG Computer Institute</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
        .login-card {
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full">
    <div class="login-card bg-white rounded-3xl p-10">

        <!-- Logo / Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 text-white rounded-2xl mb-4">
                <i class="bi bi-shield-lock text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-slate-800">Admin Login</h1>
            <p class="text-slate-500 mt-2">SRG Computer Institute</p>
        </div>

        <form action="/auth/login-page" method="post" class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                <input 
                    type="email" 
                    name="email" 
                    placeholder="admin@srginstitute.com"
                    required
                    class="w-full px-6 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Password</label>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Enter your password"
                    required
                    class="w-full px-6 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" class="w-4 h-4 accent-blue-600">
                    <span class="text-slate-600">Remember me</span>
                </label>
            <a href="/auth/forgot-password"class="text-blue-600 hover:underline">Forgot Password?</a>           
         </div>

            <button type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition text-lg">
                Login
            </button>
        </form>

        <div class="text-center mt-8 text-slate-400 text-sm">
            © 2026 SRG Computer Institute
        </div>
    </div>
</div>

</body>
</html>
