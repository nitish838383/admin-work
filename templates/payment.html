<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; padding: 15px; }
    .container { max-width: 400px; margin: 0 auto; background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header { background: #4f46e5; color: white; padding: 18px; text-align: center; margin: -20px -20px 25px -20px; border-radius: 12px 12px 0 0; }
    .payment-option {
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin: 10px 0;
      cursor: pointer;
    }
    .payment-option.selected {
      border-color: #4f46e5;
      background: #e0e7ff;
    }
    .amount {
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      margin: 25px 0;
      color: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Secure Payment</div>

    <h3>Select Payment Method</h3>
    
    <div class="payment-option selected" onclick="selectPayment(this)">UPI / Wallet</div>
    <div class="payment-option" onclick="selectPayment(this)">Credit / Debit Card</div>
    <div class="payment-option" onclick="selectPayment(this)">Net Banking</div>

    <div class="amount">
      Total Amount: ₹<span id="finalAmount">0</span>
    </div>

    <button onclick="startPayment()" 
            style="width:100%; padding:16px; background:#10b981; color:white; border:none; border-radius:10px; font-size:17px; font-weight:bold;">
      Pay Securely Now
    </button>

    <p style="text-align:center; margin-top:15px; color:#666; font-size:14px;">
      🔒 Secured by Razorpay
    </p>
  </div>

  <script>
    let selectedAmount = 0;

    function loadPayment() {
      selectedAmount = parseInt(localStorage.getItem('totalAmount')) || 350;
      document.getElementById('finalAmount').textContent = selectedAmount;
    }

    function selectPayment(el) {
      document.querySelectorAll('.payment-option').forEach(opt => opt.classList.remove('selected'));
      el.classList.add('selected');
    }

    function startPayment() {
      const options = {
        key: "rzp_test_xxxxxxxxxxxxxx", // Replace with your Razorpay Test Key
        amount: selectedAmount * 100,   // Amount in paise
        currency: "INR",
        name: "Home Services",
        description: "Service Booking Payment",
        image: "https://via.placeholder.com/128", // Your logo
        prefill: {
          name: "Rahul Sharma",
          email: "customer@example.com",
          contact: "9876543210"
        },
        theme: {
          color: "#4f46e5"
        },
        handler: function (response) {
          // Payment successful
          localStorage.setItem('paymentId', response.razorpay_payment_id);
          alert("✅ Payment Successful! Payment ID: " + response.razorpay_payment_id);
          window.location.href = 'success.html';
        },
        modal: {
          ondismiss: function() {
            alert("Payment cancelled by user.");
          }
        }
      };

      const rzp = new Razorpay(options);
      rzp.open();
    }

    window.onload = loadPayment;
  </script>
</body>
</html>
