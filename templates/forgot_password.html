<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | 🥈 LabourMitra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 to-blue-900 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <!-- Header -->
        <div class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white p-10 text-center">
            <i class="bi bi-lock-fill text-5xl mb-4"></i>
            <h1 class="text-3xl font-bold">Reset Password</h1>
            <p class="text-blue-100 mt-2">🥈 LabourMitra</p>
        </div>

        <div class="p-10">
            <form action="/auth/reset-password" method="post" class="space-y-6">
                
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Email Address</label>
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="Enter your registered email"
                        required
                        class="w-full px-6 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                </div>

                <div class="password-container">
                    <label class="block text-sm font-medium text-slate-700 mb-2">New Password</label>
                    <input 
                        type="password" 
                        id="newPassword"
                        name="new_password" 
                        placeholder="Enter new password"
                        required
                        class="w-full px-6 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    <i onclick="togglePassword('newPassword')" 
                       class="bi bi-eye toggle-password text-xl"></i>
                </div>

                <div class="password-container">
                    <label class="block text-sm font-medium text-slate-700 mb-2">Confirm New Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword"
                        name="confirm_password" 
                        placeholder="Confirm new password"
                        required
                        class="w-full px-6 py-4 border border-slate-300 rounded-2xl focus:outline-none focus:border-blue-500 transition">
                    <i onclick="togglePassword('confirmPassword')" 
                       class="bi bi-eye toggle-password text-xl"></i>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition text-lg mt-4">
                    Update Password
                </button>
            </form>

            <div class="text-center mt-8">
                <a href="/auth/login-page" 
                   class="text-blue-600 hover:underline text-sm flex items-center justify-center gap-2">
                    <i class="bi bi-arrow-left"></i> Back to Login
                </a>
            </div>
        </div>
    </div>

    <p class="text-center text-slate-400 text-sm mt-8">
        © 2026 🥈 LabourMitra | All Rights Reserved
    </p>
</div>

<script>
    function togglePassword(id) {
        const input = document.getElementById(id);
        const icon = input.nextElementSibling;
        
        if (input.type === "password") {
            input.type = "text";
            icon.classList.remove('bi-eye');
            icon.classList.add('bi-eye-slash');
        } else {
            input.type = "password";
            icon.classList.remove('bi-eye-slash');
            icon.classList.add('bi-eye');
        }
    }
</script>

</body>
</html>
