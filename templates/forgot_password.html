<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

<h2>Forgot Password</h2>

<form action="/auth/forgot-password" method="post">

    <input
        type="email"
        name="email"
        placeholder="Enter Email"
        required
    >

    <br><br>

    <button type="submit">
        Send Reset Link
    </button>

</form>

</body>
</html>
