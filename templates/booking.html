<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Workers - SRG Services</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        body { font-family: 'Poppins', sans-serif; }
        .worker-card {
            transition: all 0.4s ease;
        }
        .worker-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.15);
        }
    </style>
</head>
<body class="bg-gray-50">


<div class="max-w-7xl mx-auto px-4 py-8">

    <div class="flex flex-col lg:flex-row gap-8">

        <!-- Left Filters Sidebar -->
        <div class="w-full lg:w-80 bg-white rounded-3xl shadow p-6 h-fit sticky top-6">
            <h2 class="font-bold text-2xl mb-6 flex items-center gap-2">
                <i class="fas fa-filter"></i> Filters
            </h2>

            <!-- Search -->
            <div class="relative mb-8">
                <i class="fas fa-search absolute left-4 top-4 text-gray-400"></i>
                <input type="text" id="searchInput" 
                       class="w-full pl-12 py-4 border border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500"
                       placeholder="Search by name or skill..." 
                       onkeyup="filterWorkers()">
            </div>

            <!-- Service Category -->
            <div class="mb-8">
                <h3 class="font-semibold mb-4 text-lg">Service Category</h3>
                <div class="space-y-3" id="categoryFilters">
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" value="Painter" class="accent-blue-600" onchange="filterWorkers()">
                        <span>Painter</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" value="Mistri" class="accent-blue-600" onchange="filterWorkers()">
                        <span>Mistri (Mason)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" value="Tikedhar" class="accent-blue-600" onchange="filterWorkers()">
                        <span>Tikedhar (Contractor)</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" value="Electrician" class="accent-blue-600" checked onchange="filterWorkers()">
                        <span>Electrician</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" value="Plumber" class="accent-blue-600" onchange="filterWorkers()">
                        <span>Plumber</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer">
                        <input type="checkbox" value="Carpenter" class="accent-blue-600" onchange="filterWorkers()">
                        <span>Carpenter</span>
                    </label>
                </div>
            </div>

            <!-- Experience -->
            <div>
                <h3 class="font-semibold mb-4">Experience</h3>
                <select id="experienceFilter" onchange="filterWorkers()" 
                        class="w-full p-4 border border-gray-300 rounded-2xl">
                    <option value="">All Experience</option>
                    <option value="5">5+ Years (Expert)</option>
                    <option value="2">2-5 Years</option>
                    <option value="0">0-2 Years</option>
                </select>
            </div>
        </div>

        <!-- Workers Listing -->
        <div class="flex-1">
            <div class="flex justify-between items-center mb-8">
                <h1 class="text-3xl font-bold">Available Workers 
                    <span id="resultCount" class="text-blue-600 font-normal">(12)</span>
                </h1>
                <p class="text-gray-500">Near Ghaziabad • 24 Workers Found</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="workersGrid">
                <!-- Cards will be loaded by JS -->
            </div>
        </div>
    </div>
</div>

<script>
    const workersData = [
        { id: 1, name: "Rahul Sharma", skill: "Painter", experience: 6, rating: 4.8, mobile: "9876543210", location: "Ghaziabad", price: 350, image: "https://images.unsplash.com/photo-1621905252507-b35492cc74b4" },
        { id: 2, name: "Mohan Yadav", skill: "Mistri", experience: 8, rating: 4.6, mobile: "9123456789", location: "Noida", price: 450, image: "https://images.unsplash.com/photo-1581091226825-a6a6a2d6e5f5" },
        { id: 3, name: "Suresh Kumar", skill: "Tikedhar", experience: 12, rating: 4.9, mobile: "9988776655", location: "Ghaziabad", price: 800, image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d" },
        { id: 4, name: "Vikas Singh", skill: "Electrician", experience: 5, rating: 4.7, mobile: "9765432109", location: "Delhi", price: 300, image: "https://images.unsplash.com/photo-1556155092-490a1ba16284" },
        { id: 5, name: "Amit Patel", skill: "Plumber", experience: 4, rating: 4.5, mobile: "9654321098", location: "Ghaziabad", price: 280, image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d" },
        { id: 6, name: "Ramesh Gupta", skill: "Carpenter", experience: 7, rating: 4.8, mobile: "9876501234", location: "Noida", price: 400, image: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e" }
    ];

    function createWorkerCard(worker) {
        return `
            <div class="worker-card bg-white rounded-3xl shadow overflow-hidden" data-skill="${worker.skill}">
                <img src="${worker.image}" class="w-full h-52 object-cover">
                <div class="p-6">
                    <div class="flex justify-between items-start">
                        <h3 class="font-bold text-xl">${worker.name}</h3>
                        <span class="text-yellow-500">★ ${worker.rating}</span>
                    </div>
                    <p class="text-blue-600 font-medium">${worker.skill}</p>
                    <p class="text-sm text-gray-500 mt-1">${worker.experience} Years • ${worker.location}</p>
                    <div class="mt-6 flex justify-between items-center">
                        <div class="text-2xl font-bold text-emerald-600">₹${worker.price}/hr</div>
         <button onclick="bookWorker(${worker.id})"
class="bg-blue-600 text-white px-6 py-3 rounded-2xl text-sm font-medium hover:bg-blue-700">
    Book Now
</button>
                    </div>
                </div>
            </div>
        `;
    }

    function bookWorker(id) {
    const worker = workersData.find(w => w.id === id);

    const params = new URLSearchParams({
        worker_name: worker.name,
        service_name: worker.skill,
        amount: worker.price
    });

    window.location.href = `/auth/booking_items?${params.toString()}`;
}

    function renderWorkers(data) {
        const container = document.getElementById('workersGrid');
        container.innerHTML = data.map(w => createWorkerCard(w)).join('');
        document.getElementById('resultCount').textContent = `(${data.length})`;
    }

    function filterWorkers() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
        const checked = Array.from(document.querySelectorAll('#categoryFilters input:checked'))
                            .map(cb => cb.value);

        let filtered = workersData.filter(worker => {
            const matchSearch = worker.name.toLowerCase().includes(searchTerm) || 
                               worker.skill.toLowerCase().includes(searchTerm);
            const matchCategory = checked.length === 0 || checked.includes(worker.skill);
            return matchSearch && matchCategory;
        });

        renderWorkers(filtered);
    }


    // Initialize
    window.onload = () => {
        renderWorkers(workersData);
    };
</script>

</body>
</html>
