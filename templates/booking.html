<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Booking</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,sans-serif;
}

body{
    background:#f1f5f9;
    padding:30px;
}

.container{
    max-width:1100px;
    margin:auto;
}

.page-title{
    font-size:32px;
    font-weight:700;
    color:#0f172a;
    margin-bottom:25px;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:25px;
    margin-bottom:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.card h2{
    margin-bottom:20px;
    color:#1e293b;
    font-size:22px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

label{
    margin-bottom:8px;
    font-size:14px;
    color:#475569;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#2563eb;
}

textarea{
    resize:none;
}

.summary{
    background:#eff6ff;
    border-left:5px solid #2563eb;
}

.summary p{
    margin:10px 0;
    font-size:15px;
}

.btn{
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:15px;
    border-radius:12px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.upload-box{
    border:2px dashed #cbd5e1;
    padding:20px;
    text-align:center;
    border-radius:12px;
}

.badge{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    background:#dcfce7;
    color:#166534;
    font-size:13px;
    margin-top:10px;
}

@media(max-width:768px){
    body{
        padding:15px;
    }
}
</style>
</head>

<body>

<div class="container">

    <h1 class="page-title">
        <i class="bi bi-calendar-check"></i>
        Create New Booking
    </h1>

    <form action="/bookings/create" method="post">

        <!-- Customer Details -->
        <div class="card">
            <h2>Customer Information</h2>

            <div class="grid">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" name="customer_name" required>
                </div>

                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="text" name="mobile" required>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email">
                </div>

                <div class="form-group">
                    <label>Alternate Mobile</label>
                    <input type="text" name="alternate_mobile">
                </div>
            </div>
        </div>

        <!-- Service Details -->
        <div class="card">
            <h2>Service Details</h2>

            <div class="grid">

                <div class="form-group">
                    <label>Category</label>
                    <select name="category_id">
                        <option>Select Category</option>
                        <option>Electrician</option>
                        <option>Plumber</option>
                        <option>Painter</option>
                        <option>Carpenter</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Booking Date</label>
                    <input type="date" name="service_date">
                </div>

                <div class="form-group">
                    <label>Booking Time</label>
                    <input type="time" name="service_time">
                </div>

                <div class="form-group">
                    <label>Urgent Service</label>
                    <select name="urgent">
                        <option>No</option>
                        <option>Yes</option>
                    </select>
                </div>

            </div>

            <br>

            <div class="form-group">
                <label>Problem Description</label>
                <textarea rows="5" name="description"></textarea>
            </div>

        </div>

        <!-- Address -->
        <div class="card">
            <h2>Service Address</h2>

            <div class="form-group">
                <label>Full Address</label>
                <textarea rows="3" name="address"></textarea>
            </div>

            <br>

            <div class="grid">

                <div class="form-group">
                    <label>City</label>
                    <input type="text" name="city">
                </div>

                <div class="form-group">
                    <label>State</label>
                    <input type="text" name="state">
                </div>

                <div class="form-group">
                    <label>Pincode</label>
                    <input type="text" name="pincode">
                </div>

            </div>
        </div>

        <!-- Upload -->
        <div class="card">
            <h2>Upload Work Images</h2>

            <div class="upload-box">
                <i class="bi bi-cloud-upload fs-1"></i>
                <br><br>
                <input type="file" name="image">
            </div>
        </div>

        <!-- Summary -->
        <div class="card summary">
            <h2>Booking Summary</h2>

            <p><strong>Status:</strong> Pending</p>
            <p><strong>Worker:</strong> Not Assigned</p>
            <p><strong>Payment:</strong> Pending</p>

            <span class="badge">
                Booking will be reviewed by Admin
            </span>
        </div>

        <button type="submit" class="btn">
            Create Booking
        </button>

    </form>

</div>

</body>
</html>
